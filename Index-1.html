<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warung Bu Niwen | Urban Harvest</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff6b35; --dark: #1a1a1a; --soft: #f4f1ea; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--soft); color: var(--dark); margin: 0; overflow-x: hidden; width: 100%; }
        
        header { position: relative; width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(60%); }
        .header-title { position: absolute; color: white; text-align: center; }
        .header-title h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 3rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        .search-container { padding: 20px 5% 0 5%; }
        #searchBar { width: 100%; padding: 12px; border-radius: 50px; border: 2px solid var(--dark); box-sizing: border-box; font-size: 1rem; }
        
        .cart-nav { position: fixed; top: 20px; right: 5%; z-index: 100; }
        .cart-btn { background: var(--dark); color: white; padding: 10px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; border: 2px solid white; }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 5% 50px 5%; }
        .product-card { background: white; padding: 10px; border-radius: 20px; border: 2px solid var(--dark); text-align: center; }
        .product-card .img-placeholder { width: 100%; height: 100px; background: #eee; border-radius: 15px; margin-bottom: 5px; cursor: pointer; }
        
        #modal, #desc-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; }
        
        button { background: var(--dark); color: white; border: none; padding: 8px 12px; border-radius: 50px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 5px; }
        .btn-beli { background: var(--accent); }
    </style>
</head>
<body>

    <div class="cart-nav">
        <div class="cart-btn" onclick="openCart()">Keranjang (<span id="count">0</span>)</div>
    </div>

    <header>
        <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?w=800" class="hero-bg">
        <div class="header-title"><h1>Warung Bu Niwen</h1></div>
    </header>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Cari sayuran..." onkeyup="filterProducts()">
    </div>

    <div class="product-grid" id="grid"></div>

    <!-- Modals -->
    <div id="modal">
        <div class="modal-content">
            <h3>Daftar Pesanan</h3>
            <ul id="cart-list" style="list-style: none; padding: 0; text-align: left;"></ul>
            <p><strong>Total: Rp <span id="total">0</span></strong></p>
            <button onclick="checkout()">Checkout ke WhatsApp</button>
            <button style="background:#ccc" onclick="closeModal('modal')">Tutup</button>
        </div>
    </div>

    <div id="desc-modal">
        <div class="modal-content">
            <h3 id="desc-title"></h3>
            <p id="desc-text"></p>
            <button onclick="closeModal('desc-modal')">Tutup</button>
        </div>
    </div>

    <script>
        const WA_NUMBER = "6285695020949"; 
        const products = [
            {name: "Organic Kale", price: 12000, desc: "Kale organik segar kaya nutrisi."},
            {name: "Cherry Tomato", price: 15000, desc: "Tomat cherry manis dan segar."},
            {name: "Baby Spinach", price: 9000, desc: "Bayam muda yang lembut untuk salad."},
            {name: "Carrot Fresh", price: 8000, desc: "Wortel manis renyah kualitas terbaik."},
            {name: "Broccoli", price: 18000, desc: "Brokoli hijau kaya serat dan antioksidan."},
            {name: "Cucumber", price: 6000, desc: "Timun segar, cocok untuk lalapan."},
            {name: "Lettuce", price: 7000, desc: "Selada hidroponik yang sangat renyah."},
            {name: "Bell Pepper", price: 20000, desc: "Paprika warna-warni kaya vitamin C."},
            {name: "Eggplant", price: 10000, desc: "Terong ungu segar untuk masakan rumah."},
            {name: "Cauliflower", price: 16000, desc: "Bunga kol putih bersih dan padat."},
            {name: "Potato", price: 12000, desc: "Kentang pilihan berkualitas tinggi."},
            {name: "Pumpkin", price: 15000, desc: "Labu kuning manis dan pulen."},
            {name: "Green Beans", price: 8500, desc: "Buncis segar pilihan petani lokal."},
            {name: "Spring Onion", price: 5000, desc: "Daun bawang segar untuk pelengkap masakan."},
            {name: "Garlic", price: 12000, desc: "Bawang putih kualitas tinggi, aroma kuat."},
            {name: "Chili Pepper", price: 25000, desc: "Cabai rawit pedas segar."},
            {name: "Sweet Corn", price: 9000, desc: "Jagung manis, siap dimasak."},
            {name: "Mushrooms", price: 14000, desc: "Jamur tiram segar, tekstur kenyal."},
            {name: "Celery", price: 6000, desc: "Seledri organik aroma segar."},
            {name: "Radish", price: 7500, desc: "Lobak segar, renyah dan sehat."}
        ];
        
        let cart = [];
        const grid = document.getElementById('grid');

        function displayProducts(filter = "") {
            grid.innerHTML = "";
            products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase())).forEach((p) => {
                grid.innerHTML += `
                <div class="product-card">
                    <div class="img-placeholder" onclick="openDesc('${p.name}', '${p.desc}')"></div>
                    <h3 style="font-size: 0.8rem; margin: 5px 0;">${p.name}</h3>
                    <p style="font-size: 0.8rem; margin: 0; font-weight: 700;">Rp ${p.price.toLocaleString()}</p>
                    <button onclick="addToCart('${p.name}', ${p.price})">Tambah</button>
                    <button class="btn-beli" onclick="buyNow('${p.name}', ${p.price})">Beli</button>
                </div>`;
            });
        }

        function openDesc(name, desc) {
            document.getElementById('desc-title').innerText = name;
            document.getElementById('desc-text').innerText = desc;
            document.getElementById('desc-modal').style.display = 'flex';
        }

        function filterProducts() {
            displayProducts(document.getElementById('searchBar').value);
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('count').innerText = cart.length;
        }

        function buyNow(name, price) {
            window.location.href = `https://wa.me/${WA_NUMBER}?text=Halo Bu Niwen, saya mau beli: ${name} (Rp ${price.toLocaleString()})`;
        }

        function openCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map(i => `<li>${i.name} - Rp ${i.price.toLocaleString()}</li>`).join('');
            document.getElementById('total').innerText = cart.reduce((sum, i) => sum + i.price, 0).toLocaleString();
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function checkout() {
            let names = cart.map(i => i.name).join(", ");
            let total = cart.reduce((sum, i) => sum + i.price, 0);
            window.location.href = `https://wa.me/${WA_NUMBER}?text=Halo Bu Niwen, saya mau pesan: ${names}. Total: Rp ${total.toLocaleString()}`;
        }

        displayProducts();
    </script>
</body>
</html>
